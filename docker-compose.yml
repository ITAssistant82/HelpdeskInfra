services:
  mysql:
    image: mysql:8.0
    container_name: helpdesk_mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: pmu_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    # networks:
    #   - mysql_pmu_pmu-network  
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpdesk_app
    restart: unless-stopped
    expose:
      - "9000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: pmu_db
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: file
      MICROSOFT_REDIRECT_URI: http://localhost:8080/auth/microsoft/callback

  nginx:
    image: nginx:alpine
    container_name: helpdesk_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    # networks:
    #   - mysql_pmu_pmu-network  

volumes:
  mysql_data:
  storage_data:
  # mysql_pmu_pmu-network:
  #   external: true
